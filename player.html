<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YouTube Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <iframe
    id="ytFrame"
    allow="autoplay; encrypted-media; picture-in-picture"
    allowfullscreen>
  </iframe>

  <script>
    const params = new URLSearchParams(location.search);

    const videoId = (params.get("videoId") || "dQw4w9WgXcQ").trim();
    const mute = params.get("mute") === "0" ? "0" : "1";

    document.getElementById("ytFrame").src =
      "https://www.youtube-nocookie.com/embed/" +
      encodeURIComponent(videoId) +
      "?autoplay=1" +
      "&mute=" + mute +
      "&playsinline=1" +
      "&rel=0" +
      "&modestbranding=1" +
      "&controls=0";
  </script>
</body>
</html>
